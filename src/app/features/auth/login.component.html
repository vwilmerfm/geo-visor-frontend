<div class="login-container">
  <div class="login-card">

    <div class="institutional-header">
      <img
        ngSrc="logo-gob.png"
        alt="Presidencia-BO"
        width="64"
        height="60"
        priority
        class="logo-presidencia">

      <img
        ngSrc="logo-ine.png"
        alt="INE"
        width="99"
        height="50"
        priority
        class="logo-ine">
    </div>

    <div class="login-header">
<!--      <h2>Censo Agropecuario</h2>-->
      <img ngSrc="logo horizontal.png"
           alt="Censo Agropecuario 2026"
           width="260"
           height="60"
           priority
           class="logo-censo">
      <p>Sistema de Visualización Cartográfica</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <i class="bi bi-person-fill input-icon"></i>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Ingrese su usuario"
            [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="bi bi-lock-fill input-icon"></i>
          <input
            id="password"
            [type]="mostrarPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Ingrese su contraseña"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">

          <button type="button" class="btn-toggle-pass" (click)="togglePassword()">
            <i class="bi" [class.bi-eye]="!mostrarPassword()" [class.bi-eye-slash]="mostrarPassword()"></i>
          </button>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="error-message">
          <i class="bi bi-exclamation-triangle-fill"></i> {{ errorMessage() }}
        </div>
      }

      <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn-submit">
        @if (isLoading()) {
          <span class="spinner"></span> Validando...
        } @else {
          <span>Ingresar al Sistema <i class="bi bi-box-arrow-in-right"></i></span>
        }
      </button>

    </form>
  </div>
</div>
